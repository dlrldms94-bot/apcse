<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment | APCSE</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" class="logo">APCSE Pre-registration</a>
      <nav class="site-nav">
        <a href="index.html">Registration</a>
        <a href="mypage.html">My Page</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">Payment</h1>
    <p class="page-desc">Complete your pre-registration by paying with PayPal.</p>

    <div class="card">
      <div id="infoBox" class="alert info" hidden></div>
      <div id="errorBox" class="alert error" hidden></div>
      <div id="paypal-button-container"></div>
      <div class="actions" style="margin-top:24px;">
        <a href="index.html" class="btn btn-secondary">Back to Home</a>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const registrationId = params.get("registrationId");
    const infoBox = document.getElementById("infoBox");
    const errorBox = document.getElementById("errorBox");

    if (!registrationId) {
      errorBox.textContent = "Registration ID is missing.";
      errorBox.hidden = false;
    } else {
      infoBox.textContent = `Registration ID: ${registrationId}`;
      infoBox.hidden = false;
    }

    if (params.get("cancelled") === "1") {
      errorBox.textContent = "Payment was cancelled. You can try again below.";
      errorBox.hidden = false;
    }

    async function initPayPal() {
      const configRes = await fetch("/api/config");
      const config = await configRes.json();

      if (!config.paypalClientId) {
        errorBox.textContent = "PayPal is not configured on the server.";
        errorBox.hidden = false;
        return;
      }

      const script = document.createElement("script");
      script.src = `https://www.paypal.com/sdk/js?client-id=${config.paypalClientId}&currency=${config.registrationFee.currency}`;
      script.onload = () => {
        paypal.Buttons({
          createOrder: async () => {
            const res = await fetch("/api/payment/create-order", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ registrationId }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Failed to create order.");
            return data.orderId;
          },
          onApprove: async (data) => {
            const res = await fetch("/api/payment/capture", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                orderId: data.orderID,
                registrationId,
              }),
            });
            const result = await res.json();
            if (!res.ok) throw new Error(result.error || "Payment failed.");
            location.href = `register-complete.html?type=foreigner&id=${registrationId}`;
          },
          onError: () => {
            errorBox.textContent = "An error occurred with PayPal. Please try again.";
            errorBox.hidden = false;
          },
        }).render("#paypal-button-container");
      };
      document.head.appendChild(script);
    }

    if (registrationId) initPayPal();
  </script>
</body>
</html>
