<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 정보 수정 | APCSE</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>
  <header class="home-header">
    <a href="index.html" class="home-logo">APCSE 사전등록</a>
    <a href="mypage.html" class="home-mypage-btn">마이페이지</a>
  </header>

  <main class="page">
    <h1 class="page-title">내 정보 수정</h1>
    <p class="page-desc">등록하신 정보를 확인하고 수정할 수 있습니다.</p>

    <div class="card">
      <div id="statusBox" class="alert info" hidden></div>
      <div id="errorBox" class="alert error" hidden></div>
      <div id="successBox" class="alert success" hidden></div>
      <form id="editForm" class="form-grid" hidden></form>
      <p id="loadingText">불러오는 중...</p>
    </div>
  </main>

  <script>
    const AFFILIATION_TYPE_LABELS = {
      TEACHER_K12: "초·중·고 교사",
      PROFESSOR: "대학교수 및 강사",
      STUDENT: "대학(원)생",
      GOVERNMENT: "정부 및 공공기관 연구원/임직원",
      IT_EDU_CORP: "일반 IT/교육 기업 관계자",
      OTHER: "기타",
    };

    const ATTENDANCE_OPTIONS_DOMESTIC = [
      { value: "2026-10-15", label: "10월 15일(목)" },
      { value: "2026-10-16", label: "10월 16일(금)" },
    ];

    const ATTENDANCE_OPTIONS_FOREIGNER = [
      { value: "2026-10-14", label: "October 14 (Wed) - Pre-conference Program" },
      { value: "2026-10-15", label: "October 15 (Thu) - Main Sessions" },
      { value: "2026-10-16", label: "October 16 (Fri) - Main Sessions" },
    ];

    const DIETARY_LABELS = {
      NO_RESTRICTION: "No Restriction",
      VEGETARIAN: "Vegetarian",
      HALAL: "Halal",
      NO_PORK: "No Pork",
      NO_BEEF: "No Beef",
      OTHER: "Others & Severe Allergies",
    };

    const DOCUMENT_REQUEST_LABELS = {
      INVITATION: "Invitation Letter",
      PARTICIPATION: "Certificate of Participation",
      VISA_SUPPORT: "Visa Support Letter",
      OTHER: "Other (please specify)",
    };

    function splitDatetime(datetime) {
      if (!datetime || !datetime.includes("T")) return { date: "", time: "" };
      const [date, time] = datetime.split("T");
      return { date, time: time.slice(0, 5) };
    }

    const form = document.getElementById("editForm");
    const statusBox = document.getElementById("statusBox");
    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");
    const loadingText = document.getElementById("loadingText");
    let registration = null;

    function field(label, name, value, options = {}) {
      const type = options.type || "text";
      const required = options.required ? "required" : "";
      const disabled = options.disabled ? "disabled" : "";
      const hidden = options.hidden ? "hidden" : "";
      const placeholder = options.placeholder ? `placeholder="${options.placeholder}"` : "";
      if (type === "textarea") {
        return `<div class="field" ${hidden}><label>${label}</label><textarea name="${name}" ${required}>${value || ""}</textarea></div>`;
      }
      if (type === "checkbox") {
        return `<div class="field" ${hidden}><label class="checkbox-row"><input type="checkbox" name="${name}" ${value ? "checked" : ""}> ${label}</label></div>`;
      }
      return `<div class="field" ${hidden}><label>${label}</label><input type="${type}" name="${name}" value="${value || ""}" ${required} ${disabled} ${placeholder}></div>`;
    }

    function renderDomesticFields(data) {
      const selectedDates = data.attendanceDates || [];
      const attendanceHtml = ATTENDANCE_OPTIONS_DOMESTIC.map((option) => {
        const checked = selectedDates.includes(option.value) ? "checked" : "";
        return `<label class="checkbox-row"><input type="checkbox" name="attendanceDates" value="${option.value}" ${checked}> ${option.label}</label>`;
      }).join("");

      const affiliationType = data.affiliationType || "";
      const affiliationOptions = Object.entries(AFFILIATION_TYPE_LABELS).map(([value, label]) => {
        const checked = affiliationType === value ? "checked" : "";
        return `<label class="radio-row"><input type="radio" name="affiliationType" value="${value}" ${checked}> ${label}</label>`;
      }).join("");

      return `
        ${field("소속 기관명", "affiliation", data.affiliation, { required: true })}
        <div class="field">
          <label>소속 유형</label>
          <div class="radio-group">${affiliationOptions}</div>
          <input type="text" name="affiliationTypeOther" value="${data.affiliationTypeOther || ""}" class="inline-input" placeholder="기타 소속 유형" ${affiliationType === "OTHER" ? "" : "hidden"}>
        </div>
        ${field("휴대폰 번호", "phone", data.contact, { required: true, placeholder: "010-0000-0000" })}
        ${field("이메일 주소", "email", data.email, { required: true, type: "email" })}
        <div class="field">
          <label>참석 희망일</label>
          <div class="checkbox-group">${attendanceHtml}</div>
        </div>
        <div class="field">
          <label>교사 출장 증빙 공문 필요 여부</label>
          <div class="radio-group">
            <label class="radio-row"><input type="radio" name="teacherDocumentNeeded" value="yes" ${data.teacherDocumentNeeded ? "checked" : ""}> 필요함</label>
            <label class="radio-row"><input type="radio" name="teacherDocumentNeeded" value="no" ${!data.teacherDocumentNeeded ? "checked" : ""}> 필요 없음</label>
          </div>
        </div>
      `;
    }

    function renderForeignerFields(data) {
      const selectedDates = data.attendanceDates || [];
      const attendanceHtml = ATTENDANCE_OPTIONS_FOREIGNER.map((option) => {
        const checked = selectedDates.includes(option.value) ? "checked" : "";
        return `<label class="checkbox-row"><input type="checkbox" name="attendanceDates" value="${option.value}" ${checked}> ${option.label}</label>`;
      }).join("");

      const transport = data.transportationOptions || [];
      const arrival = splitDatetime(data.arrivalDatetime);
      const departure = splitDatetime(data.departureDatetime);
      const dietary = data.dietaryPreference || "NO_RESTRICTION";
      const dietaryOptions = Object.entries(DIETARY_LABELS).map(([value, label]) => {
        const checked = dietary === value ? "checked" : "";
        return `<label class="radio-row"><input type="radio" name="dietaryPreference" value="${value}" ${checked}> ${label}</label>`;
      }).join("");

      return `
        <div class="form-row-2">
          ${field("Given Name", "givenName", data.givenName, { required: true })}
          ${field("Family Name", "familyName", data.familyName, { required: true })}
        </div>
        ${field("Preferred Name on Badge", "preferredName", data.preferredName)}
        ${field("E-mail Address", "email", data.email, { required: true, type: "email" })}
        ${field("Mobile Phone Number", "phone", data.contact, { required: true, placeholder: "+82 10-1234-5678" })}
        ${field("WhatsApp ID", "whatsappId", data.whatsappId, { required: true })}
        <div class="field">
          <label>Participation Date</label>
          <div class="checkbox-group">${attendanceHtml}</div>
        </div>
        ${renderDocumentRequestFields(data)}
        <div class="field">
          <label>Arrival Date &amp; Time at Incheon Airport (KST)</label>
          <div class="datetime-row">
            <input type="date" name="arrivalDate" value="${arrival.date}" required>
            <input type="time" name="arrivalTime" value="${arrival.time}" required>
          </div>
        </div>
        ${field("Arrival Flight Number", "arrivalFlightNumber", data.arrivalFlightNumber, { required: true })}
        <div class="field">
          <label>Departure Date &amp; Time from Incheon Airport (KST)</label>
          <div class="datetime-row">
            <input type="date" name="departureDate" value="${departure.date}" required>
            <input type="time" name="departureTime" value="${departure.time}" required>
          </div>
        </div>
        ${field("Departure Flight Number", "departureFlightNumber", data.departureFlightNumber, { required: true })}
        <div class="field">
          <label>Transportation Support</label>
          <div class="checkbox-group">
            <label class="checkbox-row"><input type="checkbox" name="transportationOptions" value="PICKUP" ${transport.includes("PICKUP") ? "checked" : ""}> Airport Pick-up</label>
            <label class="checkbox-row"><input type="checkbox" name="transportationOptions" value="DROPOFF" ${transport.includes("DROPOFF") ? "checked" : ""}> Airport Drop-off</label>
            <label class="checkbox-row"><input type="checkbox" name="transportationOptions" value="NONE" id="transportNone" ${transport.includes("NONE") ? "checked" : ""}> No transportation support</label>
          </div>
          <p class="hint">Shuttle bus services will be available on October 13 (Incheon Airport → Hotel) and October 16 (Venue → Incheon Airport). Final operation details and schedules will be confirmed based on the pre-registration survey results and announced separately in September.</p>
        </div>
        <div class="field">
          <label>Accommodation</label>
          <div class="checkbox-group">
            <label class="checkbox-row"><input type="checkbox" name="accommodationOrganizer" id="accommodationOrganizer" ${data.accommodationType === "ORGANIZER" ? "checked" : ""}> Organizer hotel booking (At Your Own Expense)</label>
            <div id="accommodationDates" class="conditional-block" ${data.accommodationType === "ORGANIZER" ? "" : "hidden"}>
              <p class="hint">
                <a href="/files/Reservation%20Form.docx" download="Reservation Form.docx" class="btn btn-secondary" style="display:inline-flex;margin-bottom:12px;">Download Hotel Reservation Form</a>
              </p>
              <div class="field" style="margin-bottom:0">
                <label>Upload Completed Hotel Form</label>
                <input type="file" id="hotelFormUpload" accept=".pdf,.doc,.docx,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
                <p class="hint">${data.hasHotelForm ? `Uploaded: ${data.hotelFormFilename} <a href="/api/mypage/files/hotel-form" target="_blank">Download</a>` : "No file uploaded yet."}</p>
              </div>
            </div>
            <label class="checkbox-row"><input type="checkbox" name="accommodationOwn" id="accommodationOwn" ${data.accommodationType === "OWN" ? "checked" : ""}> Own accommodation</label>
          </div>
        </div>
        <div class="field">
          <label>Dietary Preferences</label>
          <div class="radio-group">${dietaryOptions}</div>
          <input type="text" name="dietaryDetails" value="${data.dietaryDetails || ""}" class="inline-input" placeholder="Details" ${dietary === "VEGETARIAN" || dietary === "OTHER" ? "" : "hidden"}>
        </div>
      `;
    }

    function renderDocumentRequestFields(data) {
      const selected = data.documentRequests?.length
        ? data.documentRequests
        : data.visaSupportNeeded
          ? ["VISA_SUPPORT"]
          : [];
      const checkboxes = Object.entries(DOCUMENT_REQUEST_LABELS).map(([value, label]) => {
        const checked = selected.includes(value) ? "checked" : "";
        return `<label class="checkbox-row"><input type="checkbox" name="documentRequests" value="${value}" ${checked}> ${label}</label>`;
      }).join("");

      return `
        <div class="field">
          <label>Document Request</label>
          <div class="checkbox-group" id="documentRequestGroup">${checkboxes}</div>
          <input type="text" name="documentRequestOther" value="${data.documentRequestOther || ""}" class="inline-input" placeholder="Please specify other document request" ${selected.includes("OTHER") ? "" : "hidden"}>
        </div>
        <div class="field" id="passportUploadBlock" ${selected.includes("VISA_SUPPORT") ? "" : "hidden"}>
          <label>Passport Copy Upload (for Visa Support Letter)</label>
          <input type="file" id="passportCopyUpload" accept=".pdf,.jpg,.jpeg,.png,image/jpeg,image/png,application/pdf">
          <p class="hint">${data.hasPassportCopy ? `Uploaded: ${data.passportCopyFilename} <a href="/api/mypage/files/passport-copy" target="_blank">Download</a>` : "Upload a scanned copy of your passport (PDF or image)."}</p>
          <p class="hint">For Invitation Letter or Certificate of Participation only, passport copy upload is not required.</p>
        </div>
      `;
    }

    function bindDocumentRequestInteractions() {
      const otherInput = form.querySelector('[name="documentRequestOther"]');
      const passportBlock = document.getElementById("passportUploadBlock");

      function refreshDocumentBlocks() {
        const selected = [...form.querySelectorAll('input[name="documentRequests"]:checked')].map((el) => el.value);
        if (otherInput) {
          otherInput.hidden = !selected.includes("OTHER");
          otherInput.required = selected.includes("OTHER");
        }
        if (passportBlock) {
          passportBlock.hidden = !selected.includes("VISA_SUPPORT");
        }
      }

      form.querySelectorAll('input[name="documentRequests"]').forEach((el) => {
        el.addEventListener("change", refreshDocumentBlocks);
      });
      refreshDocumentBlocks();
    }

    function bindForeignerInteractions() {
      const accommodationOrganizer = document.getElementById("accommodationOrganizer");
      const accommodationOwn = document.getElementById("accommodationOwn");
      const accommodationDates = document.getElementById("accommodationDates");
      if (accommodationOrganizer && accommodationOwn && accommodationDates) {
        accommodationOrganizer.addEventListener("change", () => {
          if (accommodationOrganizer.checked) {
            accommodationOwn.checked = false;
            accommodationDates.hidden = false;
          } else {
            accommodationDates.hidden = true;
          }
        });
        accommodationOwn.addEventListener("change", () => {
          if (accommodationOwn.checked) {
            accommodationOrganizer.checked = false;
            accommodationDates.hidden = true;
          }
        });
      }

      const dietaryDetails = form.querySelector('[name="dietaryDetails"]');
      form.querySelectorAll('input[name="dietaryPreference"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          if (!dietaryDetails) return;
          const needsDetails = (radio.value === "VEGETARIAN" || radio.value === "OTHER") && radio.checked;
          dietaryDetails.hidden = !needsDetails;
        });
      });
    }

    function renderForm(data) {
      const isForeigner = data.type === "FOREIGNER";
      statusBox.innerHTML = `등록 유형: <strong>${isForeigner ? "외국인" : "내국인"}</strong>` +
        (isForeigner ? ` / 결제 상태: <strong>${data.paymentStatus === "PAID" ? "결제 완료" : data.paymentStatus === "PENDING" ? "결제 대기" : data.paymentStatus}</strong>` : "");
      statusBox.hidden = false;

      form.innerHTML = `
        ${field("이름 / Name", "name", data.name, { disabled: true })}
        ${!isForeigner ? field("직함 / 직책", "title", data.title, { required: true }) : ""}
        ${!isForeigner ? renderDomesticFields(data) : renderForeignerFields(data)}
        ${!isForeigner ? renderDocumentRequestFields(data) : ""}
        ${field("새 비밀번호", "password", "", { type: "password", placeholder: "4~8자리 숫자/영문" })}
        <p class="hint">비밀번호를 잊으셨다면 사무국으로 문의해 주세요: <a href="mailto:apcse2026@i-csec.org">apcse2026@i-csec.org</a><br>If you forgot your password, please contact the Secretariat.</p>
        <div class="actions">
          <button type="submit" class="btn btn-primary">저장하기</button>
          <button type="button" class="btn btn-secondary" id="logoutBtn">로그아웃</button>
          ${isForeigner && data.paymentStatus === "PENDING" ? `<a href="payment.html?registrationId=${data.id}" class="btn btn-secondary">결제하러 가기</a>` : ""}
        </div>
      `;

      const affiliationTypeOther = form.querySelector('[name="affiliationTypeOther"]');
      form.querySelectorAll('[name="affiliationType"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          if (!affiliationTypeOther) return;
          const isOther = radio.value === "OTHER" && radio.checked;
          affiliationTypeOther.hidden = !isOther;
          affiliationTypeOther.required = isOther;
        });
      });

      if (isForeigner) bindForeignerInteractions();
      bindDocumentRequestInteractions();

      const accommodation = form.querySelector('[name="accommodation"]');
      const accommodationDays = form.querySelector('[name="accommodationDays"]');
      if (accommodation && accommodationDays) {
        accommodation.addEventListener("change", () => {
          accommodationDays.closest(".field").hidden = !accommodation.checked;
        });
      }

      document.getElementById("logoutBtn").addEventListener("click", async () => {
        await fetch("/api/mypage/logout", { method: "POST" });
        location.href = "mypage.html";
      });

      form.hidden = false;
      loadingText.hidden = true;
    }

    async function loadRegistration() {
      const res = await fetch("/api/mypage/me");
      if (res.status === 401) {
        location.href = "mypage.html";
        return;
      }
      const data = await res.json();
      if (!res.ok) {
        errorBox.textContent = data.error || "정보를 불러오지 못했습니다.";
        errorBox.hidden = false;
        loadingText.hidden = true;
        return;
      }
      registration = data.registration;
      renderForm(registration);
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.hidden = true;
      successBox.hidden = true;

      const formData = Object.fromEntries(new FormData(form));
      const documentRequests = [...form.querySelectorAll('input[name="documentRequests"]:checked')].map(
        (el) => el.value,
      );
      const payload = {
        title: formData.title,
        affiliation: formData.affiliation,
        contact: formData.contact,
        privacyConsent: true,
        documentRequests,
        documentRequestOther: documentRequests.includes("OTHER")
          ? formData.documentRequestOther
          : null,
      };

      if (registration.type === "DOMESTIC") {
        const attendanceDates = [...form.querySelectorAll('input[name="attendanceDates"]:checked')].map(
          (el) => el.value,
        );
        Object.assign(payload, {
          title: formData.title,
          affiliation: formData.affiliation,
          phone: formData.phone,
          email: formData.email,
          affiliationType: formData.affiliationType,
          affiliationTypeOther: formData.affiliationType === "OTHER" ? formData.affiliationTypeOther : null,
          attendanceDates,
          teacherDocumentNeeded: formData.teacherDocumentNeeded === "yes",
        });
      }

      if (registration.type === "FOREIGNER") {
        const attendanceDates = [...form.querySelectorAll('input[name="attendanceDates"]:checked')].map(
          (el) => el.value,
        );
        const transportationOptions = [...form.querySelectorAll('input[name="transportationOptions"]:checked')].map(
          (el) => el.value,
        );
        let accommodationType = null;
        if (formData.accommodationOrganizer) accommodationType = "ORGANIZER";
        if (formData.accommodationOwn) accommodationType = "OWN";

        Object.assign(payload, {
          givenName: formData.givenName,
          familyName: formData.familyName,
          preferredName: formData.preferredName || null,
          phone: formData.phone,
          email: formData.email,
          whatsappId: formData.whatsappId,
          attendanceDates,
          arrivalDate: formData.arrivalDate,
          arrivalTime: formData.arrivalTime,
          departureDate: formData.departureDate,
          departureTime: formData.departureTime,
          arrivalFlightNumber: formData.arrivalFlightNumber,
          departureFlightNumber: formData.departureFlightNumber,
          transportationOptions,
          accommodationType,
          dietaryPreference: formData.dietaryPreference,
          dietaryDetails:
            formData.dietaryPreference === "VEGETARIAN" || formData.dietaryPreference === "OTHER"
              ? formData.dietaryDetails
              : null,
        });
      }

      if (formData.password) payload.password = formData.password;

      const res = await fetch("/api/mypage/me", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const result = await res.json();
      if (!res.ok) {
        errorBox.textContent = result.error || "저장에 실패했습니다.";
        errorBox.hidden = false;
        return;
      }

      const hotelInput = document.getElementById("hotelFormUpload");
      if (hotelInput?.files?.length) {
        const hotelData = new FormData();
        hotelData.append("hotelForm", hotelInput.files[0]);
        await fetch("/api/mypage/upload/hotel-form", { method: "POST", body: hotelData });
      }

      const passportInput = document.getElementById("passportCopyUpload");
      if (passportInput?.files?.length) {
        const passportData = new FormData();
        passportData.append("passportCopy", passportInput.files[0]);
        await fetch("/api/mypage/upload/passport-copy", { method: "POST", body: passportData });
      }

      registration = result.registration;
      renderForm(registration);
      successBox.textContent = result.message || "정보가 저장되었습니다.";
      successBox.hidden = false;
    });

    loadRegistration();
  </script>
</body>
</html>
