<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청 내역 | APCSE 관리자</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/form.css">
  <link rel="stylesheet" href="css/admin.css?v=1200">
  <style>
    body.admin-layout .site-header-inner,
    body.admin-layout .page {
      max-width: 1200px;
    }
  </style>
</head>
<body class="admin-layout">
  <header class="site-header">
    <div class="site-header-inner">
      <a href="index.html" class="logo">APCSE 관리자</a>
      <nav class="site-nav">
        <a href="admin-registrations.html">신청 내역</a>
        <a href="admin-logs.html">로그</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">사전등록 신청 내역</h1>
    <p class="page-desc">등록이 완료된 신청자 목록입니다. 행을 클릭하면 상세 정보를 확인할 수 있습니다.</p>

    <div id="loginSection" class="card login-box">
      <form id="loginForm" class="form-grid">
        <div class="field">
          <label>관리자 비밀번호</label>
          <input type="password" id="adminPassword" required>
        </div>
        <div id="loginError" class="alert error" hidden></div>
        <button type="submit" class="btn btn-primary">로그인</button>
      </form>
    </div>

    <div id="dashboardSection" class="card" hidden>
      <div id="summaryGrid" class="summary-grid"></div>
      <div class="filter-row">
        <select id="typeFilter">
          <option value="">전체 구분</option>
          <option value="DOMESTIC">내국인</option>
          <option value="FOREIGNER">외국인</option>
        </select>
        <select id="paymentFilter">
          <option value="">전체 결제</option>
          <option value="NOT_REQUIRED">결제 없음</option>
          <option value="PENDING">결제 대기</option>
          <option value="PAID">결제 완료</option>
          <option value="FAILED">결제 실패</option>
        </select>
        <input type="search" id="searchInput" placeholder="이름, 이메일, 소속 검색" class="admin-search">
        <button type="button" class="btn btn-secondary" id="refreshBtn">새로고침</button>
        <button type="button" class="btn btn-secondary" id="exportBtn">CSV 다운로드</button>
      </div>
      <div class="log-table-wrap">
        <table class="log-table">
          <thead>
            <tr>
              <th>신청일</th>
              <th>구분</th>
              <th>이름</th>
              <th>소속</th>
              <th>연락처</th>
              <th>이메일</th>
              <th>참석일</th>
              <th>결제</th>
            </tr>
          </thead>
          <tbody id="regTableBody"></tbody>
        </table>
      </div>
      <p id="emptyMessage" class="empty-message" hidden>조건에 맞는 신청 내역이 없습니다.</p>
    </div>
  </main>

  <div id="detailModal" class="detail-modal" hidden>
    <div class="detail-modal-backdrop" id="detailBackdrop"></div>
    <div class="detail-modal-panel">
      <div class="detail-modal-header">
        <h2>신청 상세</h2>
        <button type="button" class="detail-close" id="detailClose">×</button>
      </div>
      <div id="detailContent" class="detail-content"></div>
    </div>
  </div>

  <script>
    const AFFILIATION_LABELS = {
      TEACHER_K12: "초·중·고 교사",
      PROFESSOR: "대학교수 및 강사",
      STUDENT: "대학(원)생",
      GOVERNMENT: "정부 및 공공기관",
      IT_EDU_CORP: "IT/교육 기업",
      OTHER: "기타",
    };

    const PAYMENT_LABELS = {
      NOT_REQUIRED: "해당 없음",
      PENDING: "결제 대기",
      PAID: "결제 완료",
      FAILED: "결제 실패",
    };

    const DIETARY_LABELS = {
      NO_RESTRICTION: "No Restriction",
      VEGETARIAN: "Vegetarian",
      HALAL: "Halal",
      NO_PORK: "No Pork",
      NO_BEEF: "No Beef",
      OTHER: "Others / Allergies",
    };

    let adminPassword = "";
    let allRegistrations = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("ko-KR");
    }

    function formatAttendanceDates(dates) {
      if (!dates || !dates.length) return "-";
      return dates
        .map((d) => d.replace("2026-10-", "10/"))
        .join(", ");
    }

    function paymentBadgeClass(status) {
      if (status === "PAID") return "success";
      if (status === "PENDING") return "attempt";
      if (status === "FAILED") return "failure";
      return "";
    }

    function getFilteredRegistrations() {
      const type = document.getElementById("typeFilter").value;
      const payment = document.getElementById("paymentFilter").value;
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();

      return allRegistrations.filter((row) => {
        if (type && row.type !== type) return false;
        if (payment && row.paymentStatus !== payment) return false;
        if (!keyword) return true;
        const haystack = [
          row.name,
          row.email,
          row.affiliation,
          row.contact,
          row.givenName,
          row.familyName,
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
        return haystack.includes(keyword);
      });
    }

    function renderSummary(rows) {
      const domestic = rows.filter((r) => r.type === "DOMESTIC").length;
      const foreigner = rows.filter((r) => r.type === "FOREIGNER").length;
      const paid = rows.filter((r) => r.paymentStatus === "PAID").length;

      document.getElementById("summaryGrid").innerHTML = `
        <div class="summary-card"><p>전체 신청</p><strong>${rows.length}</strong></div>
        <div class="summary-card"><p>내국인</p><strong>${domestic}</strong></div>
        <div class="summary-card"><p>외국인</p><strong>${foreigner}</strong></div>
        <div class="summary-card success"><p>결제 완료</p><strong>${paid}</strong></div>
      `;
    }

    function renderTable(rows) {
      const tbody = document.getElementById("regTableBody");
      const emptyMessage = document.getElementById("emptyMessage");

      if (!rows.length) {
        tbody.innerHTML = "";
        emptyMessage.hidden = false;
        return;
      }

      emptyMessage.hidden = true;
      tbody.innerHTML = rows
        .map(
          (row) => `
        <tr class="clickable-row" data-id="${row.id}">
          <td>${formatDate(row.createdAt)}</td>
          <td>${row.type === "DOMESTIC" ? "내국인" : "외국인"}</td>
          <td>${escapeHtml(row.name)}</td>
          <td>${escapeHtml(row.affiliation === "-" ? "" : row.affiliation) || "-"}</td>
          <td>${escapeHtml(row.contact) || "-"}</td>
          <td>${escapeHtml(row.email) || "-"}</td>
          <td>${formatAttendanceDates(row.attendanceDates)}</td>
          <td><span class="badge ${paymentBadgeClass(row.paymentStatus)}">${PAYMENT_LABELS[row.paymentStatus] || row.paymentStatus}</span></td>
        </tr>
      `,
        )
        .join("");

      tbody.querySelectorAll(".clickable-row").forEach((tr) => {
        tr.addEventListener("click", () => {
          const row = rows.find((item) => item.id === tr.dataset.id);
          if (row) openDetail(row);
        });
      });
    }

    function detailRow(label, value) {
      if (value === null || value === undefined || value === "") return "";
      return `<div class="detail-row"><dt>${escapeHtml(label)}</dt><dd>${escapeHtml(value)}</dd></div>`;
    }

    function openDetail(row) {
      const lines = [
        detailRow("등록 ID", row.id),
        detailRow("구분", row.type === "DOMESTIC" ? "내국인" : "외국인"),
        detailRow("신청일", formatDate(row.createdAt)),
        detailRow("이름", row.name),
        detailRow("Given Name", row.givenName),
        detailRow("Family Name", row.familyName),
        detailRow("배지 이름", row.preferredName),
        detailRow("직함/직책", row.title === "-" ? "" : row.title),
        detailRow("소속", row.affiliation === "-" ? "" : row.affiliation),
        detailRow(
          "소속 유형",
          row.affiliationType
            ? `${AFFILIATION_LABELS[row.affiliationType] || row.affiliationType}${row.affiliationTypeOther ? ` (${row.affiliationTypeOther})` : ""}`
            : "",
        ),
        detailRow("휴대폰/연락처", row.contact),
        detailRow("이메일", row.email),
        detailRow("WhatsApp", row.whatsappId),
        detailRow("참석 희망일", formatAttendanceDates(row.attendanceDates)),
        detailRow(
          "교사 출장 공문",
          row.teacherDocumentNeeded === true
            ? "필요"
            : row.teacherDocumentNeeded === false
              ? "불필요"
              : "",
        ),
        detailRow("비자 지원", row.visaSupportNeeded ? "Yes" : row.visaSupportNeeded === false ? "No" : ""),
        detailRow("여권번호", row.passportNumber),
        detailRow("입국 (KST)", row.arrivalDatetime),
        detailRow("입국 항공편", row.arrivalFlightNumber),
        detailRow("출국 (KST)", row.departureDatetime),
        detailRow("출국 항공편", row.departureFlightNumber),
        detailRow("교통 지원", (row.transportationOptions || []).join(", ")),
        detailRow("숙박", row.accommodationType === "ORGANIZER" ? "주최 측 예약" : row.accommodationType === "OWN" ? "개별 예약" : ""),
        detailRow("체크인", row.checkInDate),
        detailRow("체크아웃", row.checkOutDate),
        detailRow(
          "식단",
          row.dietaryPreference
            ? `${DIETARY_LABELS[row.dietaryPreference] || row.dietaryPreference}${row.dietaryDetails ? ` (${row.dietaryDetails})` : ""}`
            : row.dietary,
        ),
        detailRow("결제 상태", PAYMENT_LABELS[row.paymentStatus] || row.paymentStatus),
        detailRow("결제 금액", row.amount ? `${row.amount} ${row.currency}` : ""),
      ].filter(Boolean);

      document.getElementById("detailContent").innerHTML = `<dl class="detail-list">${lines.join("")}</dl>`;
      document.getElementById("detailModal").hidden = false;
    }

    function closeDetail() {
      document.getElementById("detailModal").hidden = true;
    }

    function renderDashboard() {
      const filtered = getFilteredRegistrations();
      renderSummary(allRegistrations);
      renderTable(filtered);
    }

    async function readJsonResponse(res) {
      const contentType = res.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        throw new Error(
          "API 서버에 연결되지 않았습니다. Express 서버를 통해 열어주세요. (로컬: npm start 후 http://localhost:3000/admin-registrations.html, 운영: https://apcse-web.onrender.com/admin-registrations.html)",
        );
      }
      return res.json();
    }

    async function loadRegistrations() {
      const res = await fetch("/api/admin/registrations", {
        headers: { "x-admin-password": adminPassword.trim() },
      });
      const data = await readJsonResponse(res);
      if (res.status === 401) {
        throw new Error("비밀번호가 일치하지 않습니다. Render Environment의 ADMIN_PASSWORD를 확인해주세요.");
      }
      if (!res.ok) throw new Error(data.error || "신청 내역 조회 실패");
      allRegistrations = data.registrations || [];
      renderDashboard();
    }

    function downloadCsv() {
      const rows = getFilteredRegistrations();
      const headers = [
        "신청일",
        "구분",
        "이름",
        "소속",
        "연락처",
        "이메일",
        "참석일",
        "결제상태",
        "등록ID",
      ];
      const csvRows = [
        headers.join(","),
        ...rows.map((row) =>
          [
            formatDate(row.createdAt),
            row.type === "DOMESTIC" ? "내국인" : "외국인",
            row.name,
            row.affiliation === "-" ? "" : row.affiliation,
            row.contact,
            row.email,
            formatAttendanceDates(row.attendanceDates),
            PAYMENT_LABELS[row.paymentStatus] || row.paymentStatus,
            row.id,
          ]
            .map((cell) => `"${String(cell ?? "").replace(/"/g, '""')}"`)
            .join(","),
        ),
      ];
      const blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `apcse-registrations-${new Date().toISOString().slice(0, 10)}.csv`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      adminPassword = document.getElementById("adminPassword").value.trim();
      try {
        await loadRegistrations();
        document.getElementById("loginSection").hidden = true;
        document.getElementById("dashboardSection").hidden = false;
      } catch (error) {
        const loginError = document.getElementById("loginError");
        loginError.textContent = error.message;
        loginError.hidden = false;
      }
    });

    document.getElementById("refreshBtn").addEventListener("click", loadRegistrations);
    document.getElementById("exportBtn").addEventListener("click", downloadCsv);
    document.getElementById("typeFilter").addEventListener("change", renderDashboard);
    document.getElementById("paymentFilter").addEventListener("change", renderDashboard);
    document.getElementById("searchInput").addEventListener("input", renderDashboard);
    document.getElementById("detailClose").addEventListener("click", closeDetail);
    document.getElementById("detailBackdrop").addEventListener("click", closeDetail);
  </script>
</body>
</html>
