<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 | APCSE</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/form.css">
</head>
<body>
  <header class="home-header">
    <a href="index.html" class="home-logo">APCSE 사전등록</a>
    <a href="mypage.html" class="home-mypage-btn">마이페이지</a>
  </header>

  <main class="page">
    <h1 class="page-title">마이페이지</h1>
    <p class="page-desc">
      등록 시 설정한 이름과 확인용 비밀번호를 입력해 주세요.<br>
      외국인 참가자: <strong>Given Name</strong>과 <strong>Family Name</strong>을 각각 입력<br>
      내국인 참가자: 이름 전체를 <strong>Given Name</strong>에 입력 (Family Name은 비워두기)<br>
      대소문자는 구분하지 않습니다.
    </p>

    <div class="card login-box">
      <form id="loginForm" class="form-grid">
        <div class="form-row-2">
          <div class="field">
            <label>Given Name (First Name) <span class="req">*</span></label>
            <input type="text" name="givenName" required autocomplete="given-name">
          </div>
          <div class="field">
            <label>Family Name (Last Name)</label>
            <input type="text" name="familyName" autocomplete="family-name">
          </div>
        </div>
        <div class="field">
          <label>확인용 비밀번호 <span class="req">*</span></label>
          <input type="password" name="password" required>
        </div>
        <p class="hint">비밀번호를 잊으셨다면 사무국으로 문의해 주세요: <a href="mailto:apcse2026@i-csec.org">apcse2026@i-csec.org</a><br>If you forgot your password, please contact the Secretariat.</p>
        <div id="errorBox" class="alert error" hidden></div>
        <div class="actions">
          <button type="submit" class="btn btn-primary" id="submitBtn">확인</button>
          <a href="index.html" class="btn btn-secondary">돌아가기</a>
        </div>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.hidden = true;
      submitBtn.disabled = true;

      const data = Object.fromEntries(new FormData(form));
      try {
        const res = await fetch("/api/mypage/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            givenName: data.givenName.trim(),
            familyName: data.familyName.trim(),
            password: data.password,
          }),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || "인증에 실패했습니다.");
        location.href = "mypage-edit.html";
      } catch (error) {
        errorBox.textContent = error.message;
        errorBox.hidden = false;
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
