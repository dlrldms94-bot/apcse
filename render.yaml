services:
  - type: web
    name: apcse-web
    runtime: node
    plan: free
    repo: https://github.com/dlrldms94-bot/apcse
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: apcse-db
          property: connectionString

databases:
  - name: apcse-db
    plan: free
