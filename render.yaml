services:
  - type: web
    name: apcse-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_CLIENT_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: REGISTRATION_FEE_AMOUNT
        value: "100"
      - key: REGISTRATION_FEE_CURRENCY
        value: USD
      - key: DATABASE_URL
        fromDatabase:
          name: apcse-db
          property: connectionString

databases:
  - name: apcse-db
    plan: free
